---
# Ansible inventory for the AVD lab
# Mirrors the containerlab topology
# Management IPs are assigned by containerlab (172.20.20.x)

all:
  children:

    # ── Top-level site group ──────────────────────────────────────────────────
    DC1:
      children:

        # ── AVD fabric group (AVD reads vars from DC1_FABRIC) ─────────────────
        DC1_FABRIC:
          children:

            DC1_SPINES:
              hosts:
                spine1:
                  ansible_host: 172.20.20.11
                spine2:
                  ansible_host: 172.20.20.12

            DC1_L3LEAVES:
              children:
                # Leaf pair 1 — will be configured as MLAG peers
                DC1_LEAF1_2:
                  hosts:
                    leaf1:
                      ansible_host: 172.20.20.13
                    leaf2:
                      ansible_host: 172.20.20.14

                # Leaf pair 2 — will be configured as MLAG peers
                DC1_LEAF3_4:
                  hosts:
                    leaf3:
                      ansible_host: 172.20.20.15
                    leaf4:
                      ansible_host: 172.20.20.16

        # ── AVD validation group ───────────────────────────────────────────────
        DC1_FABRIC_VALIDATION:
          children:
            DC1_SPINES:
            DC1_L3LEAVES:
