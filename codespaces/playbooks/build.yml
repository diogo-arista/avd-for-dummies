---
# Build — Codespaces lab
# Identical workflow to the full lab.
# Run: ansible-playbook playbooks/build.yml

- name: Build EOS configurations from AVD data models
  hosts: DC1_FABRIC
  gather_facts: false
  connection: local

  tasks:
    - name: Generate structured EOS configuration
      import_role:
        name: arista.avd.eos_designs

    - name: Generate EOS configuration files and documentation
      import_role:
        name: arista.avd.eos_cli_config_gen
