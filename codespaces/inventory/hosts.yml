---
# Ansible inventory — Codespaces lab
# Topology: 1 spine, 2 standalone leaves (no MLAG)

all:
  children:

    DC1:
      children:

        DC1_FABRIC:
          children:

            DC1_SPINES:
              hosts:
                spine1:
                  ansible_host: 172.20.20.11

            DC1_L3LEAVES:
              children:
                # Each leaf is its own node_group (standalone, no MLAG partner)
                DC1_LEAF1:
                  hosts:
                    leaf1:
                      ansible_host: 172.20.20.13

                DC1_LEAF2:
                  hosts:
                    leaf2:
                      ansible_host: 172.20.20.15

        DC1_FABRIC_VALIDATION:
          children:
            DC1_SPINES:
            DC1_L3LEAVES:
