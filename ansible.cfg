[defaults]
# Inventory location
inventory = inventory/hosts.yml

# Where AVD puts generated configs and docs
collections_paths = ~/.ansible/collections

# Reduce output noise
stdout_callback = yaml
bin_ansible_callbacks = true

# Speed: disable fact gathering (AVD doesn't need it)
gathering = explicit

# Roles path (local roles if you ever write your own)
roles_path = roles

# Retry files clutter the directory — disable them
retry_files_enabled = false

# Log all runs
log_path = logs/ansible.log

[ssh_connection]
# Faster SSH connections
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = true
