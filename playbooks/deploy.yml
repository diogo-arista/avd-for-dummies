---
# Deploy playbook
#
# This playbook connects to each device and applies the configuration
# generated by the build playbook.
#
# It uses the 'replace' strategy by default — the running config is
# replaced with the intended config. This is the safest method because
# it removes stale configuration that is no longer in the intent.
#
# Prerequisites: run build.yml first.
#
# Run: ansible-playbook playbooks/deploy.yml

- name: Deploy EOS configurations to devices
  hosts: DC1_FABRIC
  gather_facts: false

  tasks:
    - name: Deploy configurations via eAPI (config replace)
      import_role:
        name: arista.avd.eos_config_deploy_eapi
      vars:
        # 'replace' = full config replace (safest, most idempotent)
        # 'merge'   = apply only the diff (faster, but may leave stale config)
        config_replace: true

        # Set to true on the first deploy if the device has no previous config
        # and you want to skip the diff check
        # avd_deploy_config_to_device: true
