---
# Arista AVD Lab - containerlab topology
# Fabric: 2-Spine / 4-Leaf EVPN VXLAN
# Image: arista/ceos:4.32.0F (adjust tag to match what you imported)

name: avd

mgmt:
  network: mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  defaults:
    kind: ceos
    image: arista/ceos:4.32.0F
    # Startup config applied before AVD deploy
    # Creates admin user with no password so Ansible can connect
    startup-config: ../containerlab/startup-config.cfg

  nodes:
    # ─── SPINES ────────────────────────────────────────────────────────────────
    spine1:
      mgmt-ipv4: 172.20.20.11
      env:
        INTFTYPE: et

    spine2:
      mgmt-ipv4: 172.20.20.12
      env:
        INTFTYPE: et

    # ─── LEAF PAIR 1 ───────────────────────────────────────────────────────────
    leaf1:
      mgmt-ipv4: 172.20.20.13
      env:
        INTFTYPE: et

    leaf2:
      mgmt-ipv4: 172.20.20.14
      env:
        INTFTYPE: et

    # ─── LEAF PAIR 2 ───────────────────────────────────────────────────────────
    leaf3:
      mgmt-ipv4: 172.20.20.15
      env:
        INTFTYPE: et

    leaf4:
      mgmt-ipv4: 172.20.20.16
      env:
        INTFTYPE: et

  links:
    # ─── SPINE1 DOWNLINKS ──────────────────────────────────────────────────────
    # spine1 Ethernet1 -> leaf1 Ethernet1
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    # spine1 Ethernet2 -> leaf2 Ethernet1
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    # spine1 Ethernet3 -> leaf3 Ethernet1
    - endpoints: ["spine1:eth3", "leaf3:eth1"]
    # spine1 Ethernet4 -> leaf4 Ethernet1
    - endpoints: ["spine1:eth4", "leaf4:eth1"]

    # ─── SPINE2 DOWNLINKS ──────────────────────────────────────────────────────
    # spine2 Ethernet1 -> leaf1 Ethernet2
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    # spine2 Ethernet2 -> leaf2 Ethernet2
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    # spine2 Ethernet3 -> leaf3 Ethernet2
    - endpoints: ["spine2:eth3", "leaf3:eth2"]
    # spine2 Ethernet4 -> leaf4 Ethernet2
    - endpoints: ["spine2:eth4", "leaf4:eth2"]

    # ─── MLAG PEER LINKS ───────────────────────────────────────────────────────
    # leaf1 <-> leaf2 MLAG peer-link (Ethernet3 + Ethernet4)
    - endpoints: ["leaf1:eth3", "leaf2:eth3"]
    - endpoints: ["leaf1:eth4", "leaf2:eth4"]

    # leaf3 <-> leaf4 MLAG peer-link (Ethernet3 + Ethernet4)
    - endpoints: ["leaf3:eth3", "leaf4:eth3"]
    - endpoints: ["leaf3:eth4", "leaf4:eth4"]
