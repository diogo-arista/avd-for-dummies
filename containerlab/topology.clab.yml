---
# Arista AVD Lab - containerlab topology
# Fabric: 2-Spine / 4-Leaf EVPN VXLAN with MLAG
# Full lab — use this when you have 16 GB+ RAM available.
# For GitHub Codespaces, use codespaces/topology.clab.yml instead.

name: avd

mgmt:
  network: mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  defaults:
    kind: arista_ceos
    image: ceos:latest
    # Startup config applied before AVD deploy.
    # Creates the ansible user so Ansible can connect immediately.
    startup-config: startup-config.cfg

  nodes:
    # ─── SPINES ────────────────────────────────────────────────────────────────
    spine1:
      mgmt-ipv4: 172.20.20.11
      env:
        INTFTYPE: et

    spine2:
      mgmt-ipv4: 172.20.20.12
      env:
        INTFTYPE: et

    # ─── LEAF PAIR 1 (MLAG) ────────────────────────────────────────────────────
    leaf1:
      mgmt-ipv4: 172.20.20.13
      env:
        INTFTYPE: et

    leaf2:
      mgmt-ipv4: 172.20.20.14
      env:
        INTFTYPE: et

    # ─── LEAF PAIR 2 (MLAG) ────────────────────────────────────────────────────
    leaf3:
      mgmt-ipv4: 172.20.20.15
      env:
        INTFTYPE: et

    leaf4:
      mgmt-ipv4: 172.20.20.16
      env:
        INTFTYPE: et

  links:
    # ─── SPINE1 DOWNLINKS ──────────────────────────────────────────────────────
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine1:eth3", "leaf3:eth1"]
    - endpoints: ["spine1:eth4", "leaf4:eth1"]

    # ─── SPINE2 DOWNLINKS ──────────────────────────────────────────────────────
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    - endpoints: ["spine2:eth3", "leaf3:eth2"]
    - endpoints: ["spine2:eth4", "leaf4:eth2"]

    # ─── MLAG PEER LINKS ───────────────────────────────────────────────────────
    # leaf1 <-> leaf2  (Ethernet3 + Ethernet4 bundled into Port-Channel)
    - endpoints: ["leaf1:eth3", "leaf2:eth3"]
    - endpoints: ["leaf1:eth4", "leaf2:eth4"]

    # leaf3 <-> leaf4
    - endpoints: ["leaf3:eth3", "leaf4:eth3"]
    - endpoints: ["leaf3:eth4", "leaf4:eth4"]
