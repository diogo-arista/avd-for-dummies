! Minimal startup configuration for cEOS-lab nodes
! Applied by containerlab before AVD deploys the full config.
! This gives Ansible a way to connect.

username admin privilege 15 role network-admin secret admin
username ansible privilege 15 role network-admin secret ansible

management api http-commands
   no shutdown
   !
   vrf MGMT
      no shutdown
   !

ip routing

management ssh
   idle-timeout 0
   !
   vrf MGMT
      no shutdown
   !

! cEOS needs this to accept management traffic in the MGMT VRF
ip routing vrf MGMT
